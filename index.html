<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tix</title>



    <style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body{
    
    width: 100vw;
height: 100vh;
    display: flex;
    
    align-items: center;
    justify-content: space-around;
        flex-direction: column;

    
}
#box{
    width: 27rem;
    height: 27rem;
    display: flex;
    flex-wrap: wrap;
    margin-top:-5rem ;


}
#box section{
    width: 8.8rem;
    height: 9rem;
    display: flex;
     align-items: center;
    justify-content: center;
    border: 0.2rem rgb(61, 50, 183) solid;
    cursor: pointer;
    font-size: 10rem;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: rgb(67, 62, 198);

}
.txt{
    color: rgb(61, 50, 183);
    font-family:Verdana, Geneva, Tahoma, sans-serif;
    text-transform: lowercase;
    text-align: center;
}
.txt:nth-child(1){
    font-size: 8rem;
    margin-top: -3rem;
    font-family: monospace;
    text-transform: uppercase;
    
}
.txt:nth-child(1) span{
    text-transform: lowercase;
    opacity: 0.5;
}
#box section:nth-child(1),#box section:nth-child(2),#box section:nth-child(3){

    border-top-width: 0;
}
#box section:nth-child(1),#box section:nth-child(4),#box section:nth-child(7){
    border-left-width: 0;
}
#box section:nth-child(3),#box section:nth-child(6),#box section:nth-child(9){
    border-right-width: 0;
}
#box section:nth-child(7),#box section:nth-child(8),#box section:nth-child(9){
border-bottom-width: 0;
}
.scr{
    font-size: 1rem;
    color: rgb(61, 50, 183);
    opacity: 0.5;
    position: absolute;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

}


    </style>
</head>
<body>
   
    <div>
     <h1 class="txt"><span>x|<span class="scr" id="score_x">0</span></span> TIX <span>  <span class="scr" id="score_o">0</span>|o</span></h1>   <p class="txt"> turn : <span id="status_up" >not yet started</span> <span style="color: blue;font-size: 2rem;">|</span><span>status : </span><span id="status_down">not yet </span></p></div>
     
   
    </div>
    <div id="box">

        <section onclick="handleCellClick(1,1)"></section>
        <section onclick="handleCellClick(2,1)"></section>
        <section onclick="handleCellClick(3,1)"></section>
        <section onclick="handleCellClick(4,1)"></section>
        <section onclick="handleCellClick(5,1)"></section>
        <section onclick="handleCellClick(6,1)"></section>
        <section onclick="handleCellClick(7,1)"></section>
        <section onclick="handleCellClick(8,1)"></section>
        <section onclick="handleCellClick(9,1)"></section>
    </div>


    <script>
const status_up = document.getElementById("status_up");
const status_down = document.getElementById("status_down");
const score_x = document.getElementById("score_x");
const score_o = document.getElementById("score_o");
let grid_arr = ["","","","","","","","",""];
let con_arr = [
     [0, 1, 2],
  [3, 4, 5],
  [6, 7, 8],
  [0, 3, 6],
  [1, 4, 7],
  [2, 5, 8],
  [0, 4, 8],
  [2, 4, 6] ];

  let score = [0,0];

  let sts_game=false;
let xbox = document.getElementById("box");

const handleCellClick = (x, who) => {
      if(sts_game){
        grid_arr = Array(9).fill("");
    tmp_sts=0;
    display(1);
    set_status_down("game restarted");
    sts_game=false;
    }

if(get_sts()==0){
        if(grid_arr[x-1]===""){
         
        grid_arr[x-1]=who;
         
    display(1);
  if (get_sts()==1) return;
 tix();
      display(0);
  if (get_sts()==1) return;
  
    
    }
}
}

const display=(x)=>{
    
   if(x==0){setTimeout(()=>{
     xbox.innerHTML=`  
        <section onclick="handleCellClick(1,1)">${get_sty(grid_arr[0])}</section>
        <section onclick="handleCellClick(2,1)">${get_sty(grid_arr[1])}</section>
        <section onclick="handleCellClick(3,1)">${get_sty(grid_arr[2])}</section>
        <section onclick="handleCellClick(4,1)">${get_sty(grid_arr[3])}</section>
        <section onclick="handleCellClick(5,1)">${get_sty(grid_arr[4])}</section>
        <section onclick="handleCellClick(6,1)">${get_sty(grid_arr[5])}</section>
        <section onclick="handleCellClick(7,1)">${get_sty(grid_arr[6])}</section>
        <section onclick="handleCellClick(8,1)">${get_sty(grid_arr[7])}</section>
        <section onclick="handleCellClick(9,1)">${get_sty(grid_arr[8])}</section>  `   ;
        set_status_up((x==1?"tix turn":"your turn"));
   },500);}else{
     xbox.innerHTML=`  
        <section onclick="handleCellClick(1,1)">${get_sty(grid_arr[0])}</section>
        <section onclick="handleCellClick(2,1)">${get_sty(grid_arr[1])}</section>
        <section onclick="handleCellClick(3,1)">${get_sty(grid_arr[2])}</section>
        <section onclick="handleCellClick(4,1)">${get_sty(grid_arr[3])}</section>
        <section onclick="handleCellClick(5,1)">${get_sty(grid_arr[4])}</section>
        <section onclick="handleCellClick(6,1)">${get_sty(grid_arr[5])}</section>
        <section onclick="handleCellClick(7,1)">${get_sty(grid_arr[6])}</section>
        <section onclick="handleCellClick(8,1)">${get_sty(grid_arr[7])}</section>
        <section onclick="handleCellClick(9,1)">${get_sty(grid_arr[8])}</section>  `   ;
        set_status_up((x==1?"tix turn":"your turn"));
   }
}

const update_score=(x_t)=>{
      if(x_t==1){
        score[1]=score[1]+1;
      }else{
        score[0]= score[0]+1;
      }
    score_x.innerText=`${score[1]}`;
    score_o.innerText=`${score[0]}`;
}
const check_sts=()=>{


for (let i = 0; i < con_arr.length; i++) {
    const [a, b, c] = con_arr[i];
    if (grid_arr[a] === 0 && grid_arr[b] === 0 && grid_arr[c] === 0) {
       
        return 0; // O wins
    }
    if (grid_arr[a] === 1 && grid_arr[b] === 1 && grid_arr[c] === 1) {
      
       
        return 1; // X wins
    }
}

sts_game=false;
return -1; // No winner yet

}

const get_sty=(x)=>{
    return (x===1?"x":x===0?"o":"");
}

const tix_prob=(grid)=>{



   
    const dem_grid = [...grid_arr];
    for(let j=0; j<grid.length; j++){

   
    for (let i = 0; i < con_arr.length; i++) {          
    const [a, b, c] = con_arr[i];

    //is tix could be win
        dem_grid[grid[j]] = 0;
       if (dem_grid[a] === 0 && dem_grid[b] === 0 && dem_grid[c] === 0) {
       //set_status_up("suc",grid[j],grid,j,dem_grid,grid);
        return [0,grid[j]]; // O wins
    }
        dem_grid[grid[j]] = "";

    }

    }

   for(let j=0; j<grid.length; j++){
   for (let i = 0; i < con_arr.length; i++) {          
    const [a, b, c] = con_arr[i];
    //is player could be win for defence
        dem_grid[grid[j]] = 1;
       if (dem_grid[a] === 1 && dem_grid[b] === 1 && dem_grid[c] === 1) {
       //set_status_up("def",grid[j],grid,j,dem_grid,grid);

        return [1,grid[j]]; // X wins
    }
        dem_grid[grid[j]] = "";

    }   
}




return [-1,0];

}



const tix=()=>{
    //the smart openent
    let empty_indices = [];

    for(let i=0; i<grid_arr.length; i++){
        if(grid_arr[i] === ""){
            empty_indices.push(i);
        }
    }

// set_status_up(empty_indices);
if(empty_indices.length==0) return;
 const [prob,x] = tix_prob(empty_indices);
    if(prob==-1){
        const len = empty_indices.length;
        const choose = empty_indices[Math.floor(Math.random(0)*len)];
        grid_arr[choose] = 0;
        //set_status_up("tix1 : ",choose)

    }else{
        grid_arr[x] = 0;
      //  set_status_up("tix2 : ",x);
    }

}
let tmp_sts = 0;
const get_sts=()=>{
    if(tmp_sts==1) return;
    if(check_sts()==0){
        set_status_down("o win");
         sts_game=true;
        tmp_sts=1;
        update_score(0); //o win
return tmp_sts;
    }else if(check_sts()==1){
        set_status_down("x win");
         sts_game=true;
        tmp_sts=1;
        update_score(1);//x win
return tmp_sts;
    }
       let empty_indices = [];

    for(let i=0; i<grid_arr.length; i++){
        if(grid_arr[i] === ""){
            empty_indices.push(i);
        }
    }
    if(empty_indices==0){
        set_status_down("draw")
        tmp_sts=1;
        sts_game=true;
       return tmp_sts; 
    }
    return tmp_sts;
}

function set_status_up(txt){
    status_up.innerText=txt.trim();
}
function set_status_down(txt){
    status_down.innerText=txt.trim();
}

    </script>
</body>
</html>
